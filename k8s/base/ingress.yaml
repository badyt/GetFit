# ---------------------------------------------------
# Ingress: route traffic to backend and frontend
# ---------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: getfit-ingress
  namespace: getfit
  labels:
    app.kubernetes.io/part-of: getfit
  annotations:
    # Increase body size limit for file uploads (profile pictures)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - http:
        paths:
          # Backend API — all /api/* requests
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Backend static assets — exercise/food images served by Express
          - path: /images
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Backend uploads — profile pictures
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Everything else → frontend SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
