apiVersion: v1
kind: Secret
metadata:
  name: getfit-secrets
  namespace: getfit
  labels:
    app.kubernetes.io/part-of: getfit
type: Opaque
# Using stringData for readability — K8s will base64-encode automatically
# IMPORTANT: Replace these values before deploying to any real environment
stringData:
  JWT_SECRET: "your_secure_jwt_secret"
  EMAIL_USER: "your_email@gmail.com"
  EMAIL_PASSWORD: "your_email_app_password"
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/DB_NAME"
  # Admin account — created once by the seed job (optional, skipped if not set)
  ADMIN_EMAIL: "admin@getfit.com"
  ADMIN_PASSWORD: "your_secure_admin_password"
  ADMIN_NAME: "System Admin"
