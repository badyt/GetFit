# ---------------------------------------------------
# Job: Run Prisma migrations
#
# Apply AFTER postgres is running:
#   kubectl apply -f k8s/migration-job.yaml
#
# Watch progress:
#   kubectl logs -n getfit job/prisma-migrate -f
#
# Re-run after schema changes:
#   kubectl delete job prisma-migrate -n getfit
#   kubectl apply  -f k8s/migration-job.yaml
# ---------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: getfit
  labels:
    app: backend
    app.kubernetes.io/part-of: getfit
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app: backend
        component: migration
    spec:
      # Wait for PostgreSQL to accept connections before migrating
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h database -p 5432 -U postgres; do
                echo "Waiting for database to be ready..."
                sleep 2
              done
              echo "Database is ready — starting migration."
      containers:
        - name: migrate
          image: getfit-server:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: getfit-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      restartPolicy: Never
