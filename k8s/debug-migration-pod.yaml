apiVersion: v1
kind: Pod
metadata:
  name: debug-migrate
  namespace: getfit
spec:
  serviceAccountName: backend-sa
  containers:
    - name: migrate
      image: europe-west1-docker.pkg.dev/getfit-prod-487511/getfit-repo/getfit-server:latest
      command: ["sh", "-c", "sleep 3600"]
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: getfit-secrets
              key: DATABASE_URL
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "250m"
    - name: cloud-sql-proxy
      image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
      args:
        - "getfit-prod-487511:europe-west1:getfit-postgres"
        - "--port=5432"
        - "--health-check"
      ports:
        - containerPort: 5432
          protocol: TCP
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
  restartPolicy: Never
