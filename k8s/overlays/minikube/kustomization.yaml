apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - secrets.yaml
  - postgres.yaml
  - migration-job.yaml
  - seed-job.yaml

patches:
  # -------------------------------------------------------
  # Override imagePullPolicy to Never for minikube
  # (images are built inside minikube's Docker daemon)
  # -------------------------------------------------------
  - target:
      kind: Deployment
      name: backend
      namespace: getfit
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: frontend
      namespace: getfit
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # -------------------------------------------------------
  # Backend: add wait-for-db initContainer (in-cluster Postgres)
  # -------------------------------------------------------
  - target:
      kind: Deployment
      name: backend
      namespace: getfit
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers
        value:
          - name: wait-for-db
            image: postgres:16-alpine
            command:
              - sh
              - -c
              - |
                until pg_isready -h database -p 5432 -U postgres; do
                  echo "Waiting for database to be ready..."
                  sleep 2
                done
                echo "Database is ready!"
  # -------------------------------------------------------
  # Ingress: add host for local access via getfit.local
  # -------------------------------------------------------
  - target:
      kind: Ingress
      name: getfit-ingress
      namespace: getfit
    patch: |-
      - op: add
        path: /spec/rules/0/host
        value: "getfit.local"
      - op: add
        path: /spec/ingressClassName
        value: "nginx"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1use-regex
        value: "true"
