# Copy this file to secrets.yaml and fill in your PRODUCTION credentials.
# secrets.yaml is gitignored — never commit real credentials.
#
#   cp secrets.example.yaml secrets.yaml
#
# IMPORTANT: Use strong, unique values for production.
apiVersion: v1
kind: Secret
metadata:
  name: getfit-secrets
  namespace: getfit
  labels:
    app.kubernetes.io/part-of: getfit
type: Opaque
stringData:
  JWT_SECRET: "your_production_jwt_secret"
  EMAIL_USER: "your_email@gmail.com"
  EMAIL_PASSWORD: "your_email_app_password"
  # Cloud SQL Auth Proxy exposes the database on 127.0.0.1:5432 inside the pod
  # Replace with your Cloud SQL credentials (user, password created in setup steps)
  DATABASE_URL: "postgresql://getfit_user:your_cloud_sql_password@127.0.0.1:5432/getfit"
  # Admin account — created once by the seed job (optional, skipped if not set)
  ADMIN_EMAIL: "admin@getfit.com"
  ADMIN_PASSWORD: "your_secure_admin_password"
  ADMIN_NAME: "System Admin"
