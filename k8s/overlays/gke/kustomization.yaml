apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - secrets.yaml

# -------------------------------------------------------
# Swap local image names → Artifact Registry
# -------------------------------------------------------
images:
  - name: getfit-server
    newName: europe-west1-docker.pkg.dev/getfit-prod-487511/getfit-repo/getfit-server
    newTag: latest
  - name: getfit-frontend
    newName: europe-west1-docker.pkg.dev/getfit-prod-487511/getfit-repo/getfit-frontend
    newTag: latest

# No patches needed — base ingress is already hostless and
# imagePullPolicy defaults to IfNotPresent.
