# ---------------------------------------------------
# Job: Seed database with food/exercise data (GKE — via Cloud SQL Auth Proxy)
# Waits for migrations to complete before importing.
# ---------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: db-seed
  namespace: getfit
  labels:
    app: backend
    app.kubernetes.io/part-of: getfit
    app.kubernetes.io/component: seed
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app: backend
        component: seed
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: seed
          image: getfit-server:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              echo "Waiting for Cloud SQL Proxy..."
              until node -e "const net = require('net'); const s = net.connect(5432, '127.0.0.1', () => { s.end(); process.exit(0); }); s.on('error', () => process.exit(1));" 2>/dev/null; do
                sleep 2
              done

              echo "Cloud SQL Proxy is ready. Starting seed..."
              sleep 5

              echo "Seeding admin account..."
              node src/scripts/seedAdmin.js
              echo "Importing food data..."
              node src/scripts/importFoods.js
              echo "Importing exercise data..."
              node src/scripts/importExercises.js
              echo "Seed complete."
              
              # Signal the Cloud SQL Proxy to quit gracefully
              echo "Signaling Cloud SQL Proxy to shut down..."
              wget -qO- --post-data='' http://localhost:9091/quitquitquit || echo "Failed to signal proxy (may already be down)"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: getfit-secrets
                  key: DATABASE_URL
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: getfit-secrets
                  key: ADMIN_EMAIL
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: getfit-secrets
                  key: ADMIN_PASSWORD
                  optional: true
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: getfit-secrets
                  key: ADMIN_NAME
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        # Cloud SQL Auth Proxy sidecar
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "getfit-prod-487511:europe-west1:getfit-postgres"
            - "--port=5432"
            - "--quitquitquit"
            - "--health-check"
          ports:
            - containerPort: 5432
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
      restartPolicy: OnFailure
