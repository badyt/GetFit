# ---------------------------------------------------
# KSA: backend-sa
# Used by backend pods to authenticate to Cloud SQL
# via Workload Identity (mapped to a Google SA with
# roles/cloudsql.client).
# ---------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: getfit
  labels:
    app.kubernetes.io/part-of: getfit
  annotations:
    # Grant this KSA the ability to act as the Google SA
    iam.gke.io/gcp-service-account: getfit-backend@getfit-prod-487511.iam.gserviceaccount.com
