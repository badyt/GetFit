version: '3.8'

# Development docker-compose configuration
# This extends the base docker-compose.yml with development-specific settings

services:
  database:
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: base  # Use base stage instead of production
    volumes:
      # Mount source code for hot-reloading
      - ./server/src:/app/src:ro
      - ./server/prisma:/app/prisma:ro
      - server_uploads_dev:/app/uploads
      - ./frontend/assets/images:/app/frontend/assets/images:ro
    environment:
      NODE_ENV: development
    command: npm run dev
    # Override health check for dev
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      # Mount source code for hot-reloading
      - ./frontend:/app:ro
      - /app/node_modules
      - /app/.expo
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    command: npx expo start --web
    ports:
      - "8081:8081"  # Expo dev server
      - "19006:19006"  # Web port
    # Override health check for dev
    healthcheck:
      disable: true

volumes:
  postgres_data_dev:
  server_uploads_dev:

networks:
  getfit-network:
    driver: bridge
