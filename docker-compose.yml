version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: getfit-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: getfit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - getfit-network

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: getfit-server
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@database:5432/getfit
      JWT_SECRET: ${JWT_SECRET:-your_secure_jwt_secret_change_this_in_production}
      APP_URL: ${APP_URL:-http://localhost:3000}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      # Mount uploads directory for persistent file storage
      - server_uploads:/app/uploads
      # Mount frontend assets for serving images
      - ./frontend/assets/images:/app/frontend/assets/images:ro
    networks:
      - getfit-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/auth/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Run migrations before starting the server
    command: sh -c "npx prisma migrate deploy && node src/app.js"

  # Frontend Web Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:3000/api}
    container_name: getfit-frontend
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      API_URL: ${API_URL:-http://localhost:3000/api}
    ports:
      - "80:80"
    networks:
      - getfit-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  server_uploads:
    driver: local

networks:
  getfit-network:
    driver: bridge
